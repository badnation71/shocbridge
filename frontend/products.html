<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - ShocBridge</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo"><a href="index.html">ShocBridge</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Shop</a></li>
                <li><a href="measurement.html">Measure</a></li>
                <li><a href="dashboard.html">Account</a></li>
                <li><a href="#" id="cartLink" class="cart-link">Cart <span id="cartCount">0</span></a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <h1>Our Shoe Collection</h1>
        <p>Browse our curated selection of shoes</p>
    </section>

    <!-- Filters and Products -->
    <section class="products-section">
        <div class="container">
            <div class="products-layout">
                <!-- Filters Sidebar -->
                <aside class="filters-sidebar">
                    <h3>Filters</h3>
                    
                    <div class="filter-group">
                        <h4>Brand</h4>
                        <div id="brandFilters"></div>
                    </div>
                    
                    <div class="filter-group">
                        <h4>Category</h4>
                        <div id="categoryFilters"></div>
                    </div>
                    
                    <div class="filter-group">
                        <h4>Price Range</h4>
                        <input type="range" id="priceRange" min="0" max="500" value="500">
                        <p>Up to $<span id="priceValue">500</span></p>
                    </div>
                    
                    <button id="clearFilters" class="btn btn-outline">Clear Filters</button>
                </aside>

                <!-- Products Grid -->
                <main class="products-main">
                    <div class="products-controls">
                        <div class="sort-control">
                            <label for="sortBy">Sort by:</label>
                            <select id="sortBy">
                                <option value="newest">Newest</option>
                                <option value="price-asc">Price: Low to High</option>
                                <option value="price-desc">Price: High to Low</option>
                                <option value="popular">Most Popular</option>
                            </select>
                        </div>
                        <p id="resultCount">Loading...</p>
                    </div>
                    
                    <div id="productsList" class="products-grid"></div>
                    
                    <!-- Pagination -->
                    <div id="pagination" class="pagination"></div>
                </main>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ShocBridge. All rights reserved.</p>
        </div>
    </footer>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
